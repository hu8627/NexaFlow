<svg width="100%" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" style="background-color: #0B0F19; border-radius: 16px;">
  <!-- ========================================== -->
  <!-- 1. 赛博朋克点阵背景 (Dot Grid Background) -->
  <!-- ========================================== -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle fill="#1e293b" cx="2" cy="2" r="1.5"></circle>
    </pattern>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    
    <!-- 卡片渐变与发光特效 -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="gradEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#065f46" stop-opacity="0.05" />
    </linearGradient>
    
    <!-- 核心模式发光滤镜 -->
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#dots)" />

  <!-- ========================================== -->
  <!-- 2. 坐标轴与大盘网格 (Axes) -->
  <!-- ========================================== -->
  <!-- Y轴：任务不确定性 -->
  <line x1="100" y1="50" x2="100" y2="520" stroke="#475569" stroke-width="1.5" marker-start="url(#arrowHead)"/>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" x="80" y="285" text-anchor="middle" transform="rotate(-90 80 285)" letter-spacing="2">任务不确定性 (Task Uncertainty)</text>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b" x="130" y="65">高 (High)</text>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b" x="130" y="505">低 (Low)</text>

  <!-- X轴：流程复杂度 -->
  <line x1="100" y1="520" x2="820" y2="520" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" x="460" y="555" text-anchor="middle" letter-spacing="2">业务流程复杂度 (Process Complexity)</text>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b" x="120" y="500">简单 (Simple)</text>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748b" x="760" y="500">复杂 (Complex)</text>

  <!-- 中心虚线分割十字 -->
  <line x1="460" y1="70" x2="460" y2="520" stroke="#334155" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="100" y1="295" x2="800" y2="295" stroke="#334155" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ========================================== -->
  <!-- 3. 象限卡片 (Quadrants) -->
  <!-- ========================================== -->

  <!-- [Q1] 模式 A (Top-Left) -->
  <g transform="translate(130, 80)">
    <rect width="300" height="185" rx="12" fill="url(#gradBlue)" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="0" y="0" width="8" height="185" fill="#3b82f6" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#60a5fa" x="20" y="25">[ MODE A ]</text>
    <text font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#eff6ff" x="20" y="50">单 Agent 解释器</text>
    
    <circle cx="25" cy="80" r="3" fill="#60a5fa"/><text font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" x="38" y="84">客服 / 售前实时咨询</text>
    <circle cx="25" cy="110" r="3" fill="#60a5fa"/><text font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" x="38" y="114">意图驱动的单轮任务</text>
    <circle cx="25" cy="140" r="3" fill="#60a5fa"/><text font-family="system-ui, sans-serif" font-size="13" fill="#bfdbfe" x="38" y="144">极简审批与查询分发</text>
  </g>

  <!-- [Q2] 覆盖盲区 (Top-Right) -->
  <g transform="translate(490, 80)">
    <rect width="300" height="185" rx="12" fill="url(#gradRed)" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="0" y="0" width="8" height="185" fill="#ef4444" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#f87171" x="20" y="25">[ DANGER ZONE ]</text>
    <text font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fef2f2" x="20" y="50">全自动覆盖盲区</text>
    
    <circle cx="25" cy="80" r="3" fill="#f87171"/><text font-family="system-ui, sans-serif" font-size="13" fill="#fecaca" x="38" y="84">流程拓扑动态生成 (易崩溃)</text>
    <circle cx="25" cy="110" r="3" fill="#f87171"/><text font-family="system-ui, sans-serif" font-size="13" fill="#fecaca" x="38" y="114">Agent 自主任务分解规划</text>
    <circle cx="25" cy="140" r="3" fill="#f87171"/><text font-family="system-ui, sans-serif" font-size="13" fill="#fecaca" x="38" y="144">开放式研究与 Meta-Agent</text>
  </g>

  <!-- [Q4] 模式 B (Bottom-Right) -->
  <g transform="translate(490, 315)">
    <rect width="300" height="185" rx="12" fill="url(#gradPurple)" stroke="#6d28d9" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="0" y="0" width="8" height="185" fill="#a855f7" rx="4"/>
    <text font-family="monospace" font-size="10" fill="#c084fc" x="20" y="25">[ MODE B ]</text>
    <text font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#faf5ff" x="20" y="50">多 Agent 流水线</text>
    
    <circle cx="25" cy="80" r="3" fill="#c084fc"/><text font-family="system-ui, sans-serif" font-size="13" fill="#e9d5ff" x="38" y="84">异步长流程任务处理</text>
    <circle cx="25" cy="110" r="3" fill="#c084fc"/><text font-family="system-ui, sans-serif" font-size="13" fill="#e9d5ff" x="38" y="114">研究报告与内容创作流水线</text>
    <circle cx="25" cy="140" r="3" fill="#c084fc"/><text font-family="system-ui, sans-serif" font-size="13" fill="#e9d5ff" x="38" y="144">代码 Review 与多专家协作</text>
  </g>

  <!-- [Q3] GridsPilot 混合模式 (Bottom-Left / The Sweet Spot) -->
  <!-- 💡 核心视觉高亮区域 -->
  <g transform="translate(130, 315)" filter="url(#glowEmerald)">
    <rect width="300" height="185" rx="12" fill="url(#gradEmerald)" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="8" height="185" fill="#10b981" rx="4"/>
    
    <text font-family="monospace" font-size="10" font-weight="700" fill="#34d399" x="20" y="25">[ GridsPilot OS CORE ]</text>
    <text font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#ecfdf5" x="20" y="50">PNSA 混合编排模式</text>
    
    <circle cx="25" cy="80" r="4" fill="#34d399"/><text font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a7f3d0" x="38" y="84">确定性骨架 + 局部自治</text>
    <circle cx="25" cy="110" r="3" fill="#6ee7b7"/><text font-family="system-ui, sans-serif" font-size="13" fill="#d1fae5" x="38" y="114">金融贷款/合规审批</text>
    <circle cx="25" cy="140" r="3" fill="#6ee7b7"/><text font-family="system-ui, sans-serif" font-size="13" fill="#d1fae5" x="38" y="144">政务/电商带人机熔断流转</text>
    <circle cx="25" cy="170" r="3" fill="#6ee7b7"/><text font-family="system-ui, sans-serif" font-size="13" fill="#d1fae5" x="38" y="174">IT 自动化工单系统</text>
  </g>

  <!-- ========================================== -->
  <!-- 4. 底部图例与决策导向 (Legend) -->
  <!-- ========================================== -->
  <line x1="60" y1="580" x2="840" y2="580" stroke="#334155" stroke-width="1"/>
  <text font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e2e8f0" x="60" y="615">场景架构选择判定：</text>

  <!-- 模式 A 图例 -->
  <rect x="200" y="605" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.8"/>
  <text font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" x="218" y="614">单会话 + 强意图驱动 <tspan fill="#60a5fa">→ 模式 A</tspan></text>

  <!-- 模式 B 图例 -->
  <rect x="200" y="635" width="10" height="10" rx="2" fill="#a855f7" opacity="0.8"/>
  <text font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" x="218" y="644">多步产物 + 专家分工 <tspan fill="#c084fc">→ 模式 B</tspan></text>

  <!-- GridsPilot 图例 -->
  <rect x="440" y="605" width="10" height="10" rx="2" fill="#10b981" />
  <text font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" x="458" y="614">严合规约束 + 需局部推理拦截 <tspan font-weight="700" fill="#34d399">→ GridsPilot 混合编排</tspan></text>

  <!-- 盲区图例 -->
  <rect x="440" y="635" width="10" height="10" rx="2" fill="#ef4444" opacity="0.8"/>
  <text font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" x="458" y="644">流程拓扑需动态生成 <tspan fill="#f87171">→ 盲区风险 (极易崩溃)</tspan></text>

</svg>